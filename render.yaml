# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: doson-ledger
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gthread --workers 1 --threads 8 --timeout 300 --graceful-timeout 30
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
